<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy - The Media Bin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .wrapper {
      width: min(900px, 100%);
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }
    .game-box {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.28);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .scoreboard {
      font-weight: 700;
    }
    .button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    canvas {
      background: linear-gradient(#0ea5e9, #1e293b);
      border: 1px solid #334155;
      border-radius: 12px;
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .controls {
      margin-top: 16px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    .links {
      margin-top: 18px;
    }
    .links a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Flappy</h1>
    <p>Tap the air and fly through the pipes.</p>

    <div class="hud">
  <div class="scoreboard">Score: <span id="score">0</span></div>
  <div class="scoreboard">Best: <span id="bestScore">0</span></div>
  <button class="button" id="resetButton">Reset Game</button>
  <button class="button" id="soundButton">Sound: On</button>
  <div class="scoreboard" id="statusText">Press Space to start</div>
</div>

      <canvas id="game" width="700" height="500"></canvas>

      <div class="controls">
        Jump: Space / Click<br />
        Restart: R
      </div>
    </div>

    <div class="links">
      <a href="/games/">← Back to Games</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    const scoreEl = document.getElementById("score");
    const statusText = document.getElementById("statusText");
    const resetButton = document.getElementById("resetButton");
    const soundButton = document.getElementById("soundButton");
    const bestScoreEl = document.getElementById("bestScore");
    const birdSprite = new Image();
birdSprite.src = "/games/assets/flappy-bird-sprite.png";

    const gravity = 0.4;
    const flapStrength = -7;
    const pipeWidth = 70;
    const pipeGap = 150;
    const pipeSpeed = 3;

    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let pipes = [];
    let audioContext = null;
    let soundEnabled = true;
    let lastScorePlayedAt = 0;
    let clouds = [];
    let hills = [];
    let bestScore = Number(localStorage.getItem("flappyBestScore")) || 0;
bestScoreEl.textContent = bestScore;

    const bird = {
      x: 140,
      y: 220,
      radius: 20,
      velocity: 0
    };

function getAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioContext;
}

function playTone(frequency, duration, type = "sine", volume = 0.03) {
  if (!soundEnabled) return;

  const ac = getAudioContext();
  const oscillator = ac.createOscillator();
  const gainNode = ac.createGain();

  oscillator.type = type;
  oscillator.frequency.value = frequency;
  gainNode.gain.value = volume;

  oscillator.connect(gainNode);
  gainNode.connect(ac.destination);

  oscillator.start();

  gainNode.gain.exponentialRampToValueAtTime(
    0.0001,
    ac.currentTime + duration
  );

  oscillator.stop(ac.currentTime + duration);
}

function playFlapSound() {
  playTone(700, 0.05, "square", 0.025);
}

function playScoreSound() {
  playTone(880, 0.05, "square", 0.03);
  setTimeout(() => playTone(1046, 0.06, "square", 0.025), 50);
}

function playHitSound() {
  playTone(180, 0.12, "sawtooth", 0.04);
}

function playStartSound() {
  playTone(523, 0.05, "triangle", 0.02);
}

function createCloud(x = canvas.width + Math.random() * 200) {
  return {
    x,
    y: 40 + Math.random() * 180,
    width: 48 + Math.random() * 36,
    speed: 0.4 + Math.random() * 0.5
  };
}

function resetClouds() {
  clouds = [];
  for (let i = 0; i < 4; i++) {
    clouds.push(createCloud(i * 180 + 80));
  }
}

function updateClouds() {
  for (const cloud of clouds) {
    cloud.x -= cloud.speed;
  }

  clouds = clouds.filter(cloud => cloud.x + cloud.width > -20);

  while (clouds.length < 4) {
    clouds.push(createCloud());
  }
}

function drawClouds() {
  const unit = 6;

  for (const cloud of clouds) {
    const x = Math.round(cloud.x / unit) * unit;
    const y = Math.round(cloud.y / unit) * unit;

    // shadow
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    const shadowPixels = [
      [1,3],[2,3],[3,3],[4,3],[5,3],
      [0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4],
      [1,5],[2,5],[3,5],[4,5],[5,5]
    ];
    shadowPixels.forEach(([px, py]) => {
      ctx.fillRect(x + px * unit + 2, y + py * unit + 2, unit, unit);
    });

    // main cloud
    ctx.fillStyle = "#f8fafc";
    const cloudPixels = [
      [2,0],[3,0],
      [1,1],[2,1],[3,1],[4,1],
      [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],
      [1,3],[2,3],[3,3],[4,3],
      [2,4],[3,4]
    ];
    cloudPixels.forEach(([px, py]) => {
      ctx.fillRect(x + px * unit, y + py * unit, unit, unit);
    });

    // highlight
    ctx.fillStyle = "#ffffff";
    const highlightPixels = [
      [2,0],[1,1],[2,1]
    ];
    highlightPixels.forEach(([px, py]) => {
      ctx.fillRect(x + px * unit, y + py * unit, unit, unit);
    });
  }
}

function createHill(x, layer = 1) {
  return {
    x,
    y: layer === 1 ? canvas.height - 90 : canvas.height - 70,
    width: layer === 1 ? 140 + Math.random() * 40 : 180 + Math.random() * 60,
    height: layer === 1 ? 50 + Math.random() * 20 : 70 + Math.random() * 30,
    speed: layer === 1 ? 0.35 : 0.18,
    layer
  };
}

function resetHills() {
  hills = [];

  let x1 = 0;
  while (x1 < canvas.width + 200) {
    const hill = createHill(x1, 1);
    hills.push(hill);
    x1 += hill.width * 0.7;
  }

  let x2 = 0;
  while (x2 < canvas.width + 200) {
    const hill = createHill(x2, 2);
    hills.push(hill);
    x2 += hill.width * 0.75;
  }
}

function updateHills() {
  for (const hill of hills) {
    hill.x -= hill.speed;
  }

  const layer1 = hills.filter(h => h.layer === 1);
  const layer2 = hills.filter(h => h.layer === 2);

  if (layer1.length > 0) {
    const rightmost1 = Math.max(...layer1.map(h => h.x + h.width));
    if (rightmost1 < canvas.width + 120) {
      hills.push(createHill(rightmost1 - 20, 1));
    }
  }

  if (layer2.length > 0) {
    const rightmost2 = Math.max(...layer2.map(h => h.x + h.width));
    if (rightmost2 < canvas.width + 120) {
      hills.push(createHill(rightmost2 - 20, 2));
    }
  }

  hills = hills.filter(h => h.x + h.width > -50);
}

    function resetGame() {
      gameStarted = false;
      gameOver = false;
      score = 0;
      bird.y = 220;
      bird.velocity = 0;
      pipes = [];
      scoreEl.textContent = score;
      statusText.textContent = "Press Space to start";
      resetClouds();
      resetHills();
      draw();
    }

    function flap() {
  getAudioContext();

  if (!gameStarted && !gameOver) {
    gameStarted = true;
    statusText.textContent = "Game in progress";
    playStartSound();
  }

  if (!gameOver) {
    bird.velocity = flapStrength;
    playFlapSound();
  }
}

    function spawnPipe() {
      const minTop = 60;
      const maxTop = canvas.height - pipeGap - 60;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;

      pipes.push({
        x: canvas.width,
        topHeight,
        bottomY: topHeight + pipeGap,
        passed: false
      });
    }

    function update() {
      bird.velocity += gravity;
      bird.y += bird.velocity;
      updateClouds();
      updateHills();

      if (bird.y - bird.radius < 0 || bird.y + bird.radius > canvas.height) {
        endGame();
      }

      if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 260) {
        spawnPipe();
      }

      for (const pipe of pipes) {
        pipe.x -= pipeSpeed;

        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
  pipe.passed = true;
  score += 1;
  scoreEl.textContent = score;
  playScoreSound();

  if (score > bestScore) {
    bestScore = score;
    bestScoreEl.textContent = bestScore;
    localStorage.setItem("flappyBestScore", bestScore);
  }
}
        const hitPipeHorizontally =
          bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipeWidth;

        const hitTopPipe = bird.y - bird.radius < pipe.topHeight;
        const hitBottomPipe = bird.y + bird.radius > pipe.bottomY;

        if (hitPipeHorizontally && (hitTopPipe || hitBottomPipe)) {
          endGame();
        }
      }

      pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
    }

   function endGame() {
  if (gameOver) return;
  gameOver = true;

  if (score === bestScore && score > 0) {
    statusText.textContent = "New Best! Press R to restart";
  } else {
    statusText.textContent = "Game Over - Press R to restart";
  }

  playHitSound();
}

  function drawBird() {
  const tilt = Math.max(-0.6, Math.min(0.6, bird.velocity * 0.06));

  const frameWidth = birdSprite.width / 3;
  const frameHeight = birdSprite.height;

  let frame = 1;
  if (bird.velocity < -1.5) {
    frame = 0;
  } else if (bird.velocity > 2) {
    frame = 2;
  }

  // Looser crop so the bird does not get cut off
  const cropX = frame * frameWidth + frameWidth * 0.10;
  const cropY = frameHeight * 0.12;
  const cropW = frameWidth * 0.80;
  const cropH = frameHeight * 0.72;

  const drawWidth = 84;
  const drawHeight = 96;

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(tilt);

  if (birdSprite.complete && birdSprite.naturalWidth > 0) {
    ctx.drawImage(
      birdSprite,
      cropX, cropY,
      cropW, cropH,
      -drawWidth / 2, -drawHeight / 2,
      drawWidth, drawHeight
    );
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#facc15";
    ctx.fill();
    ctx.closePath();
  }

  ctx.restore();
}

function drawHills() {
  const backHills = hills.filter(h => h.layer === 2);
  const frontHills = hills.filter(h => h.layer === 1);

  // Back layer
  ctx.fillStyle = "#86efac";
  for (const hill of backHills) {
    ctx.beginPath();
    ctx.moveTo(hill.x, canvas.height - 24);
    ctx.quadraticCurveTo(
      hill.x + hill.width / 2,
      hill.y - hill.height,
      hill.x + hill.width,
      canvas.height - 24
    );
    ctx.closePath();
    ctx.fill();
  }

  // Front layer
  ctx.fillStyle = "#4ade80";
  for (const hill of frontHills) {
    ctx.beginPath();
    ctx.moveTo(hill.x, canvas.height - 24);
    ctx.quadraticCurveTo(
      hill.x + hill.width / 2,
      hill.y - hill.height,
      hill.x + hill.width,
      canvas.height - 24
    );
    ctx.closePath();
    ctx.fill();
  }
}

    function drawPipes() {
  const unit = 6; // pixel block size

  for (const pipe of pipes) {
    const pipeX = Math.round(pipe.x / unit) * unit;
    const topHeight = Math.floor(pipe.topHeight / unit) * unit;
    const bottomY = Math.floor(pipe.bottomY / unit) * unit;
    const pipeBodyWidth = Math.floor(pipeWidth / unit) * unit;
    const capHeight = unit * 4;
    const capWidth = pipeBodyWidth + unit * 2;

    // Main colors
    const dark = "#166534";
    const mid = "#22c55e";
    const light = "#86efac";
    const outline = "#14532d";

    // Top pipe body
    ctx.fillStyle = outline;
    ctx.fillRect(pipeX - unit, 0, pipeBodyWidth + unit * 2, topHeight);

    ctx.fillStyle = mid;
    ctx.fillRect(pipeX, 0, pipeBodyWidth, topHeight);

    // Top pipe highlight/shadow stripes
    ctx.fillStyle = light;
    ctx.fillRect(pipeX + unit, 0, unit, topHeight);

    ctx.fillStyle = dark;
    ctx.fillRect(pipeX + pipeBodyWidth - unit * 2, 0, unit, topHeight);

    // Top cap
    ctx.fillStyle = outline;
    ctx.fillRect(pipeX - unit * 2, topHeight - capHeight, capWidth + unit * 2, capHeight);

    ctx.fillStyle = mid;
    ctx.fillRect(pipeX - unit, topHeight - capHeight + unit / 2, capWidth, capHeight - unit / 2);

    ctx.fillStyle = light;
    ctx.fillRect(pipeX, topHeight - capHeight + unit / 2, unit, capHeight - unit / 2);

    ctx.fillStyle = dark;
    ctx.fillRect(pipeX + capWidth - unit * 2, topHeight - capHeight + unit / 2, unit, capHeight - unit / 2);

    // Bottom pipe body
    ctx.fillStyle = outline;
    ctx.fillRect(pipeX - unit, bottomY, pipeBodyWidth + unit * 2, canvas.height - bottomY);

    ctx.fillStyle = mid;
    ctx.fillRect(pipeX, bottomY, pipeBodyWidth, canvas.height - bottomY);

    // Bottom pipe highlight/shadow stripes
    ctx.fillStyle = light;
    ctx.fillRect(pipeX + unit, bottomY, unit, canvas.height - bottomY);

    ctx.fillStyle = dark;
    ctx.fillRect(pipeX + pipeBodyWidth - unit * 2, bottomY, unit, canvas.height - bottomY);

    // Bottom cap
    ctx.fillStyle = outline;
    ctx.fillRect(pipeX - unit * 2, bottomY, capWidth + unit * 2, capHeight);

    ctx.fillStyle = mid;
    ctx.fillRect(pipeX - unit, bottomY, capWidth, capHeight - unit / 2);

    ctx.fillStyle = light;
    ctx.fillRect(pipeX, bottomY, unit, capHeight - unit / 2);

    ctx.fillStyle = dark;
    ctx.fillRect(pipeX + capWidth - unit * 2, bottomY, unit, capHeight - unit / 2);
  }
}

    function drawOverlay() {
      if (!gameStarted && !gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Press Space to Start", canvas.width / 2, canvas.height / 2);
      }

      if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "44px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "24px Arial";
        ctx.fillText("Press R to Restart", canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawClouds();
      drawHills();
      drawPipes();

 // Ground
ctx.fillStyle = "#4d7c0f";
ctx.fillRect(0, canvas.height - 24, canvas.width, 24);

ctx.fillStyle = "#84cc16";
ctx.fillRect(0, canvas.height - 24, canvas.width, 6);

// Pixel dirt pattern
for (let x = 0; x < canvas.width; x += 12) {
  ctx.fillStyle = x % 24 === 0 ? "#65a30d" : "#3f6212";
  ctx.fillRect(x, canvas.height - 18, 6, 6);
}
      drawBird();
      drawOverlay();
    }

    function loop() {
      if (gameStarted && !gameOver) {
        update();
      }

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        flap();
      }

      if (event.key.toLowerCase() === "r") {
        resetGame();
      }
    });

    canvas.addEventListener("click", flap);
    resetButton.addEventListener("click", resetGame);

soundButton.addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  soundButton.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
});

    resetGame();
    loop();
  </script>
</body>
</html>
