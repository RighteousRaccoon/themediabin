<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy - The Media Bin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .wrapper {
      width: min(900px, 100%);
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }
    .game-box {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.28);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .scoreboard {
      font-weight: 700;
    }
    .button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    canvas {
      background: linear-gradient(#0ea5e9, #1e293b);
      border: 1px solid #334155;
      border-radius: 12px;
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .controls {
      margin-top: 16px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    .links {
      margin-top: 18px;
    }
    .links a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Flappy</h1>
    <p>Tap the air and fly through the pipes.</p>

    <div class="game-box">
      <div class="hud">
        <div class="scoreboard">Score: <span id="score">0</span></div>
        <button class="button" id="resetButton">Reset Game</button>
        <button class="button" id="soundButton">Sound: On</button>
        <div class="scoreboard" id="statusText">Press Space to start</div>
      </div>

      <canvas id="game" width="700" height="500"></canvas>

      <div class="controls">
        Jump: Space / Click<br />
        Restart: R
      </div>
    </div>

    <div class="links">
      <a href="/games/">← Back to Games</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    const scoreEl = document.getElementById("score");
    const statusText = document.getElementById("statusText");
    const resetButton = document.getElementById("resetButton");
    const soundButton = document.getElementById("soundButton");
    const birdSprite = new Image();
birdSprite.src = "/games/assets/flappy-bird-sprite.png";

    const gravity = 0.4;
    const flapStrength = -7;
    const pipeWidth = 70;
    const pipeGap = 150;
    const pipeSpeed = 3;

    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let pipes = [];
    let audioContext = null;
    let soundEnabled = true;
    let lastScorePlayedAt = 0;

    const bird = {
      x: 140,
      y: 220,
      radius: 20,
      velocity: 0
    };

function getAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioContext;
}

function playTone(frequency, duration, type = "sine", volume = 0.03) {
  if (!soundEnabled) return;

  const ac = getAudioContext();
  const oscillator = ac.createOscillator();
  const gainNode = ac.createGain();

  oscillator.type = type;
  oscillator.frequency.value = frequency;
  gainNode.gain.value = volume;

  oscillator.connect(gainNode);
  gainNode.connect(ac.destination);

  oscillator.start();

  gainNode.gain.exponentialRampToValueAtTime(
    0.0001,
    ac.currentTime + duration
  );

  oscillator.stop(ac.currentTime + duration);
}

function playFlapSound() {
  playTone(700, 0.05, "square", 0.025);
}

function playScoreSound() {
  playTone(880, 0.05, "square", 0.03);
  setTimeout(() => playTone(1046, 0.06, "square", 0.025), 50);
}

function playHitSound() {
  playTone(180, 0.12, "sawtooth", 0.04);
}

function playStartSound() {
  playTone(523, 0.05, "triangle", 0.02);
}

    function resetGame() {
      gameStarted = false;
      gameOver = false;
      score = 0;
      bird.y = 220;
      bird.velocity = 0;
      pipes = [];
      scoreEl.textContent = score;
      statusText.textContent = "Press Space to start";
      draw();
    }

    function flap() {
  getAudioContext();

  if (!gameStarted && !gameOver) {
    gameStarted = true;
    statusText.textContent = "Game in progress";
    playStartSound();
  }

  if (!gameOver) {
    bird.velocity = flapStrength;
    playFlapSound();
  }
}

    function spawnPipe() {
      const minTop = 60;
      const maxTop = canvas.height - pipeGap - 60;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;

      pipes.push({
        x: canvas.width,
        topHeight,
        bottomY: topHeight + pipeGap,
        passed: false
      });
    }

    function update() {
      bird.velocity += gravity;
      bird.y += bird.velocity;

      if (bird.y - bird.radius < 0 || bird.y + bird.radius > canvas.height) {
        endGame();
      }

      if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 260) {
        spawnPipe();
      }

      for (const pipe of pipes) {
        pipe.x -= pipeSpeed;

        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
  pipe.passed = true;
  score += 1;
  scoreEl.textContent = score;
  playScoreSound();
}

        const hitPipeHorizontally =
          bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipeWidth;

        const hitTopPipe = bird.y - bird.radius < pipe.topHeight;
        const hitBottomPipe = bird.y + bird.radius > pipe.bottomY;

        if (hitPipeHorizontally && (hitTopPipe || hitBottomPipe)) {
          endGame();
        }
      }

      pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
    }

    function endGame() {
  if (gameOver) return;
  gameOver = true;
  statusText.textContent = "Game Over - Press R to restart";
  playHitSound();
}

  function drawBird() {
  const tilt = Math.max(-0.6, Math.min(0.6, bird.velocity * 0.06));

  // Sprite sheet has 3 frames laid out horizontally
  const frameWidth = birdSprite.width / 3;
  const frameHeight = birdSprite.height;

  let frame = 1;

if (bird.velocity < -1.5) {
  frame = 0; // wing up
} else if (bird.velocity > 2) {
  frame = 2; // wing down
} else {
  frame = 1; // neutral
}

  if (gameStarted && !gameOver) {
    frame = Math.floor(performance.now() / 120) % 3;
  }

  const drawWidth = 56;
  const drawHeight = 56;

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(tilt);

  if (birdSprite.complete && birdSprite.naturalWidth > 0) {
    ctx.drawImage(
      birdSprite,
      frame * frameWidth, 0,         // source x, y
      frameWidth, frameHeight,       // source width, height
      -drawWidth / 2, -drawHeight / 2, // destination x, y
      drawWidth, drawHeight          // destination width, height
    );
  } else {
    // fallback while loading
    ctx.beginPath();
    ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#facc15";
    ctx.fill();
    ctx.closePath();
  }

  ctx.restore();
}

    function drawPipes() {
  for (const pipe of pipes) {
    // Pipe body
    const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
    gradient.addColorStop(0, "#15803d");
    gradient.addColorStop(0.5, "#22c55e");
    gradient.addColorStop(1, "#166534");

    ctx.fillStyle = gradient;

    // Top pipe
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

    // Bottom pipe
    ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);

    // Pipe caps
    ctx.fillStyle = "#16a34a";
    ctx.fillRect(pipe.x - 6, pipe.topHeight - 24, pipeWidth + 12, 24);
    ctx.fillRect(pipe.x - 6, pipe.bottomY, pipeWidth + 12, 24);

    // Highlights
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.fillRect(pipe.x + 8, 0, 8, pipe.topHeight);
    ctx.fillRect(pipe.x + 8, pipe.bottomY, 8, canvas.height - pipe.bottomY);

    // Cap highlights
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.fillRect(pipe.x - 2, pipe.topHeight - 20, 8, 16);
    ctx.fillRect(pipe.x - 2, pipe.bottomY + 4, 8, 16);
  }
}

    function drawOverlay() {
      if (!gameStarted && !gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Press Space to Start", canvas.width / 2, canvas.height / 2);
      }

      if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "44px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "24px Arial";
        ctx.fillText("Press R to Restart", canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPipes();
  ctx.fillStyle = "#65a30d";
ctx.fillRect(0, canvas.height - 24, canvas.width, 24);

ctx.fillStyle = "#84cc16";
ctx.fillRect(0, canvas.height - 24, canvas.width, 6);
      drawBird();
      drawOverlay();
    }

    function loop() {
      if (gameStarted && !gameOver) {
        update();
      }

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        flap();
      }

      if (event.key.toLowerCase() === "r") {
        resetGame();
      }
    });

    canvas.addEventListener("click", flap);
    resetButton.addEventListener("click", resetGame);

soundButton.addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  soundButton.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
});

    resetGame();
    loop();
  </script>
</body>
</html>
