      off.width = ninjaSprite.width;
      off.height = ninjaSprite.height;
      const offCtx = off.getContext("2d");
      offCtx.imageSmoothingEnabled = false;
      offCtx.drawImage(ninjaSprite, 0, 0);

      const imageData = offCtx.getImageData(0, 0, off.width, off.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        if (r > 215 && g > 215 && b > 215) {
          data[i + 3] = 0;
        }
      }

      offCtx.putImageData(imageData, 0, 0);
      processedNinjaSprite = off;

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function addScreenShake(amount) {
      if (amount > screenShake) {

      }
    }

    function playTone(frequency, duration, type = "sine", volume = 0.03) {
      if (!soundEnabled) return;

      const ac = getAudioContext();
      const oscillator = ac.createOscillator();
      const gainNode = ac.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;

      oscillator.connect(gainNode);
      gainNode.connect(ac.destination);

      oscillator.start();

      gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        ac.currentTime + duration
      );

      oscillator.stop(ac.currentTime + duration);
    }

        if (player.vx < -moveCap) player.vx = -moveCap;

      const prevX = player.x;
      const prevY = player.y;
      const wasOnGround = onGround;
const fallSpeedBeforeCollision = player.vy;

      player.x += player.vx;

          )
        ) {

            player.x = platform.x - player.width;

            player.x = platform.x + platform.width;

            player.y = platform.y + platform.height;

    function drawDashOrbs() {
      for (const orb of dashOrbs) {
        if (orb.collected) continue;

        const t = performance.now() * 0.006;

        ctx.save();
        ctx.shadowBlur = 14;
        ctx.shadowColor = "#fb923c";

        ctx.fillStyle = "#fdba74";
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#f97316";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.radius + Math.sin(t) * 1.5, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#fff7ed";
        ctx.beginPath();
        ctx.arc(orb.x - 3, orb.y - 3, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function drawExitPortal() {
      const cx = exitPortal.x + exitPortal.width / 2;
      const cy = exitPortal.y + exitPortal.height / 2;
      const t = performance.now() * (levelEnding ? 0.012 : 0.005);

      const outer = currentTheme === "magenta" ? "#f472b6" : "#a855f7";
      const inner = currentTheme === "magenta" ? "#f9a8d4" : "#c084fc";
      const core = currentTheme === "magenta" ? "rgba(244, 114, 182, 0.22)" : "rgba(216, 180, 254, 0.22)";
      const particle = currentTheme === "magenta" ? "#ffe4e6" : "#e9d5ff";

      ctx.save();
      ctx.shadowBlur = 18;
      ctx.shadowColor = outer;

      ctx.strokeStyle = outer;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 12 + Math.sin(t) * 1.5, 20 + Math.cos(t) * 1.5, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = inner;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 7, 14, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 5, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 4; i++) {
        const angle = t + i * (Math.PI / 2);
        const px = cx + Math.cos(angle) * 10;
        const py = cy + Math.sin(angle) * 18;

        ctx.fillStyle = particle;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw &&
             ax + aw > bx &&
             ay < by + bh &&
             ay + ah > by;
    }

    function drawBackground() {
      if (currentTheme === "magenta") {
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bg.addColorStop(0, "#1a0b2e");
        bg.addColorStop(1, "#0f172a");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(244, 114, 182, 0.18)";
      } else {
        ctx.fillStyle = "rgba(147, 197, 253, 0.15)";
      }

      for (let i = 0; i < 40; i++) {
        const x = (i * 173) % canvas.width;
        const y = (i * 97) % 220;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    function drawPlatforms() {
      const topColor = currentTheme === "magenta" ? "#f472b6" : "#22d3ee";
      const baseColor = currentTheme === "magenta" ? "#312e81" : "#1f2937";
      const highlightColor = currentTheme === "magenta" ? "#4338ca" : "#374151";

      for (const platform of platforms) {
        ctx.fillStyle = baseColor;
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

        ctx.fillStyle = topColor;
        ctx.fillRect(platform.x, platform.y, platform.width, 4);

        ctx.fillStyle = highlightColor;
        ctx.fillRect(platform.x + 4, platform.y + 6, platform.width - 8, 4);
      }
    }

    function drawSpikes() {
      const fill = currentTheme === "magenta" ? "#fda4af" : "#e5e7eb";
      const edge = currentTheme === "magenta" ? "#fb7185" : "#94a3b8";
      const base = currentTheme === "magenta" ? "#7f1d1d" : "#475569";

      for (const spike of spikes) {
        const spikeCount = spike.width / 10;

        for (let i = 0; i < spikeCount; i++) {
          const x = spike.x + i * 10;
          const y = spike.y;

          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.moveTo(x, y + spike.height);
          ctx.lineTo(x + 5, y);
          ctx.lineTo(x + 10, y + spike.height);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.fillStyle = base;
        ctx.fillRect(spike.x, spike.y + spike.height - 3, spike.width, 3);
      }
    }

    function drawPlayer() {
      const sprite = processedNinjaSprite || ninjaSprite;
      const frameWidth = sprite.width / 4;
      const frameHeight = sprite.height;

      let frame = 0;

      if (!onGround || wallSliding) {
        frame = 3;
      } else if (Math.abs(player.vx) > 0.2) {
        frame = Math.floor(performance.now() / 120) % 2 + 1;
      }

      const cropX = frame * frameWidth + frameWidth * 0.10;
      const cropY = frameHeight * 0.04;
      const cropW = frameWidth * 0.80;
      const cropH = frameHeight * 0.92;

      const drawWidth = 52;
      const drawHeight = 72;

      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2 - 6);

      if (player.facing < 0) {
        ctx.scale(-1, 1);
      }

      if (processedNinjaSprite || (sprite.complete && sprite.naturalWidth > 0)) {
        ctx.drawImage(
          sprite,
          cropX, cropY,
          cropW, cropH,
          -drawWidth / 2, -drawHeight / 2,
          drawWidth, drawHeight
        );
      } else {
        ctx.fillStyle = "#1f2937";
        ctx.fillRect(-12, -14, 24, 28);
        ctx.fillStyle = "#22d3ee";
        ctx.fillRect(-8, -4, 16, 4);
      }

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();

      if (screenShake > 0) {
        const offsetX = (Math.random() - 0.5) * screenShake;
        const offsetY = (Math.random() - 0.5) * screenShake;
        ctx.translate(offsetX, offsetY);
        screenShake *= 0.85;

        if (screenShake < 0.2) {
          screenShake = 0;
        }
      }

      drawBackground();
      drawPlatforms();
      drawSpikes();
      drawDashOrbs();
      drawExitPortal();
      drawDashTrailParticles();
drawWallSlideParticles();
drawLandingDustParticles();
drawOrbPickupParticles();
drawCelebration();
drawDeathParticles();

      if (deathResetTimer <= 0) {
        drawPlayer();
      }

      ctx.restore();
    }

   function gameLoop() {
  updateTimer();
  updatePlayer();
  updateCelebration();
  updateOrbPickupParticles();
  updateDashTrailParticles();
  updateDeathParticles();
  updateWallSlideParticles();
  updateLandingDustParticles();

  if (deathResetTimer > 0) {
    deathResetTimer--;
    if (deathResetTimer <= 0) {
      resetLevel();
    }
  }

  draw();
  animationFrameId = requestAnimationFrame(gameLoop);
}

function startGameLoop() {
  if (gameLoopStarted) return;
  gameLoopStarted = true;
  animationFrameId = requestAnimationFrame(gameLoop);
}

    function queueJump() {
  jumpBufferTimer = JUMP_BUFFER_FRAMES;
}

   function tryJump() {
  getAudioContext();

  if (onGround || coyoteTimer > 0) {
    player.vy = jumpPower;
    onGround = false;
    coyoteTimer = 0;
    jumpBufferTimer = 0;
    statusText.textContent = "Jumping";
    playJumpSound();
    return true;
  }

  if (wallSliding) {
    player.vy = jumpPower * 0.9;

    if (touchingWallLeft) {
      player.vx = 6;
      player.facing = 1;
    } else if (touchingWallRight) {
      player.vx = -6;
      player.facing = -1;
    }

    wallSliding = false;
    jumpBufferTimer = 0;
    statusText.textContent = "Wall jump!";
    playWallJumpSound();
    return true;
  }

  return false;
}

    function tryDash() {
  if (dashCharges > 0 && !onGround && !isDashing) {
    const dashSpeed = isMobileViewport() ? 15 : 10.5;
    const dashFrames = isMobileViewport() ? 14 : 9;

    dashCharges = 0;
    dashText.textContent = dashCharges;
    isDashing = true;
    dashTimer = dashFrames;
    player.vy = 0;
    player.vx = player.facing * dashSpeed;
    statusText.textContent = "Dash!";
    playDashSound();
    addScreenShake(4);
  }
}

    function resetStick() {
      stickActive = false;
      mobileMoveX = 0;
      if (stickKnob) {
        stickKnob.style.transform = "translate(0px, 0px)";
      }
    }

    function updateStickFromEvent(clientX, clientY) {
      const rect = stickZone.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      let dx = clientX - centerX;
      let dy = clientY - centerY;

      const distance = Math.sqrt(dx * dx + dy * dy);
      const maxDistance = stickRadius - knobRadius;

      if (distance > maxDistance && distance > 0) {
        const scale = maxDistance / distance;
        dx *= scale;
        dy *= scale;
      }

      mobileMoveX = dx / maxDistance;
      if (Math.abs(mobileMoveX) < 0.08) mobileMoveX = 0;

      stickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (
        event.code === "Space" ||
        event.key === "ArrowUp" ||
        event.key === "ArrowLeft" ||
        event.key === "ArrowRight"
      ) {
        event.preventDefault();
      }

      if (key === "a" || event.key === "ArrowLeft") keys.left = true;
      if (key === "d" || event.key === "ArrowRight") keys.right = true;

      if (key === "x" || event.key === "Shift") {
        tryDash();
      }

      if (key === "w" || key === " " || event.key === "ArrowUp") {
  queueJump();
  tryJump();
}

      if (key === "r") {
        resetLevel();
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (
        event.code === "Space" ||
        event.key === "ArrowUp" ||
        event.key === "ArrowLeft" ||
        event.key === "ArrowRight"
      ) {
        event.preventDefault();
      }

      if (key === "a" || event.key === "ArrowLeft") keys.left = false;
      if (key === "d" || event.key === "ArrowRight") keys.right = false;
    });

    window.addEventListener("mousedown", () => {
      if (document.activeElement) {
        document.activeElement.blur();
      }
    });

    resetButton.addEventListener("click", () => {
      resetLevel();
      resetButton.blur();
    });

    soundButton.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundButton.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
      soundButton.blur();
    });

    if (goLevelButton && levelSelect) {
      goLevelButton.addEventListener("click", () => {
        const selectedLevel = Number(levelSelect.value);
        currentLevel = selectedLevel;
        loadLevel(currentLevel);
        goLevelButton.blur();
      });
    }

    levelSelect.addEventListener("change", () => {
      levelSelect.blur();
    });

   if (fullscreenButton && playArea) {
  fullscreenButton.addEventListener("click", async () => {
    try {
      if (!document.fullscreenElement) {
        await playArea.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    } catch (error) {
      console.error(error);
    }
  });
}

    if (stickZone) {
      stickZone.addEventListener("touchstart", (event) => {
        event.preventDefault();
        const touch = event.changedTouches[0];
        stickActive = true;
        updateStickFromEvent(touch.clientX, touch.clientY);
      }, { passive: false });

      stickZone.addEventListener("touchmove", (event) => {
        if (!stickActive) return;
        event.preventDefault();
        const touch = event.changedTouches[0];
        updateStickFromEvent(touch.clientX, touch.clientY);
      }, { passive: false });

      stickZone.addEventListener("touchend", (event) => {
        event.preventDefault();
        resetStick();
      }, { passive: false });

      stickZone.addEventListener("touchcancel", (event) => {
        event.preventDefault();
        resetStick();
      }, { passive: false });
    }

    if (jumpBtn) {
      const jumpPress = (event) => {
  event.preventDefault();
  jumpBtn.classList.add("active");
  queueJump();
  tryJump();
};

      const jumpRelease = (event) => {
        event.preventDefault();
        jumpBtn.classList.remove("active");
      };

      jumpBtn.addEventListener("touchstart", jumpPress, { passive: false });
      jumpBtn.addEventListener("touchend", jumpRelease, { passive: false });
      jumpBtn.addEventListener("touchcancel", jumpRelease, { passive: false });

      jumpBtn.addEventListener("mousedown", jumpPress);
      jumpBtn.addEventListener("mouseup", jumpRelease);
      jumpBtn.addEventListener("mouseleave", jumpRelease);
    }

    if (dashBtn) {
      const dashPress = (event) => {
        event.preventDefault();
        dashBtn.classList.add("active");
        tryDash();
      };

      const dashRelease = (event) => {
        event.preventDefault();
        dashBtn.classList.remove("active");
      };

      dashBtn.addEventListener("touchstart", dashPress, { passive: false });
      dashBtn.addEventListener("touchend", dashRelease, { passive: false });
      dashBtn.addEventListener("touchcancel", dashRelease, { passive: false });

      dashBtn.addEventListener("mousedown", dashPress);
      dashBtn.addEventListener("mouseup", dashRelease);
      dashBtn.addEventListener("mouseleave", dashRelease);
    }

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
    }, { passive: false });

    loadLevel(currentLevel);
startGameLoop();
  </script>
</body>
</html>
